<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#56565d"/>
      <stop offset="100%" stop-color="#3d3d43"/>
    </radialGradient>
  </defs>

  <circle cx="100" cy="100" r="96" fill="url(#bg)" stroke="#6e6e76" stroke-width="2"/>

  <g transform="translate(100,100)">
    <g transform="rotate(-90)">

      <!-- Ring 1 — all 12 sectors -->
      <path d="M0,0 L17.3,-5 A18,18,0,0,1,17.3,5 Z" fill="#f5c99b" opacity="0.85"/>
      <path d="M0,0 L17.3,-5 A18,18,0,0,1,17.3,5 Z" fill="#f5c99b" opacity="0.85" transform="rotate(30)"/>
      <path d="M0,0 L17.3,-5 A18,18,0,0,1,17.3,5 Z" fill="#f5c99b" opacity="0.85" transform="rotate(60)"/>
      <path d="M0,0 L5,-17.3 A18,18,0,0,1,-5,-17.3 Z" fill="#f5c99b" opacity="0.85" transform="rotate(90)"/>
      <path d="M0,0 L17.3,-5 A18,18,0,0,1,17.3,5 Z" fill="#f5c99b" opacity="0.85" transform="rotate(120)"/>
      <path d="M0,0 L17.3,-5 A18,18,0,0,1,17.3,5 Z" fill="#f5c99b" opacity="0.85" transform="rotate(150)"/>
      <path d="M0,0 L17.3,-5 A18,18,0,0,1,17.3,5 Z" fill="#f5c99b" opacity="0.85" transform="rotate(180)"/>
      <path d="M0,0 L17.3,-5 A18,18,0,0,1,17.3,5 Z" fill="#f5c99b" opacity="0.85" transform="rotate(210)"/>
      <path d="M0,0 L17.3,-5 A18,18,0,0,1,17.3,5 Z" fill="#f5c99b" opacity="0.85" transform="rotate(240)"/>
      <path d="M0,0 L5,-17.3 A18,18,0,0,1,-5,-17.3 Z" fill="#f5c99b" opacity="0.85" transform="rotate(270)"/>
      <path d="M0,0 L17.3,-5 A18,18,0,0,1,17.3,5 Z" fill="#f5c99b" opacity="0.85" transform="rotate(300)"/>
      <path d="M0,0 L17.3,-5 A18,18,0,0,1,17.3,5 Z" fill="#f5c99b" opacity="0.85" transform="rotate(330)"/>

      <!-- Dominant SW sector — rings 2–5 -->
      <path d="M0,0 L29,-7.8 A30,30,0,0,1,29,7.8 Z" fill="#ecad73" opacity="0.9" transform="rotate(120)"/>
      <path d="M0,0 L44,-12 A46,46,0,0,1,44,12 Z" fill="#DD8D57" opacity="0.9" transform="rotate(120)"/>
      <path d="M0,0 L60,-16 A62,62,0,0,1,60,16 Z" fill="#c97340" opacity="0.9" transform="rotate(120)"/>
      <path d="M0,0 L72,-20 A75,75,0,0,1,72,20 Z" fill="#a85a2b" opacity="0.9" transform="rotate(120)"/>

      <!-- W sector — rings 2–4 -->
      <path d="M0,0 L29,-7.8 A30,30,0,0,1,29,7.8 Z" fill="#ecad73" opacity="0.9" transform="rotate(150)"/>
      <path d="M0,0 L42,-11 A43,43,0,0,1,42,11 Z" fill="#DD8D57" opacity="0.9" transform="rotate(150)"/>
      <path d="M0,0 L55,-15 A57,57,0,0,1,55,15 Z" fill="#c97340" opacity="0.9" transform="rotate(150)"/>

      <!-- NE sector — rings 2–3 -->
      <path d="M0,0 L29,-7.8 A30,30,0,0,1,29,7.8 Z" fill="#ecad73" opacity="0.9" transform="rotate(30)"/>
      <path d="M0,0 L38,-10 A40,40,0,0,1,38,10 Z" fill="#DD8D57" opacity="0.9" transform="rotate(30)"/>

    </g>
  </g>

  <circle cx="100" cy="100" r="4" fill="#DD8D57"/>
</svg>
